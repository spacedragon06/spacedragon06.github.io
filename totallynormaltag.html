<!doctype html>
<html>
  <head>
    <script>
      let flyt = `data:image/bmp;base64,Qk3yAQAAAAAAAIoAAAB8AAAACQAAAAoAAAABACAAAwAAAGgBAACuGwAArhsAAAAAAAAAAAAAAAD/
      AAD/AAD/AAAAAAAA/0JHUnOdmPUoQ+IeFR6F6wEzMzMTZmZmJmZmZgaZmZkJTODWAxqGjzIAAAAA
      AAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAzNDRAM7R0wDY29sA0dHRAMrJyQDa29sA4OLiANvd3gDa
      3N0AzdDSAM/S0wna3N0w29rcE9fT2hf///8F4uTkGNja2wbY2tsAxsrLAMjMzR/Mz8/Oq66qzouR
      g9DBxMGe19nauMPHyB7Dx8gAuL7AAM/U1gixt7mzeoR7/0NXQ/+XnJj/xMrMq77Fxwa2vb4AxMjH
      AIGMkgCFkJdTUV5g+DBANv9fa232maSqTpSfpACYnZoAtrm2AMvNyQV7gIIjQE5FwzpaSP9CUUmu
      d31/IbW4tBWzt7cCsrWyALC0sQji3NwIVmJYikZhVv9ebGFwAAAAAK+yrwatsbABs7azAKmtqQC0
      uLELZGx5NkpRXX5scns0oqahDZ+inwCqr60A0dbWAKi0xwCssa8H////AAAAAAD//+4BnaKgCq64
      vQC/xccA0dbWAKm+6ACtsbAArbKvAKKqsACdoZ4AnaGeAIBuTQC+xMUA`;
      const resolutions = {
        svga: [800, 600],
        xga: [1024, 768],
        sxga: [1280, 960],
        wsvga: [1024, 576],
        hd: [1280, 720],
        wxga: [1366, 768],
        fhd: [1920, 1080],
        square: [800, 800],
      };
      let resolution = resolutions.square;
      let tilesize = 20;
      let tiles = [
        Math.floor(resolution[0] / tilesize),
        Math.floor(resolution[1] / tilesize),
      ];
      let playersize = tilesize / 2;
      let queue = [false, false, false, false];
      let queue2 = [false, false, false, false];
      let Walls = [
        // sx sy dx dy
      ];
      let Map2 = [
        [280, 60, 40, 60],
        [40, 60, 40, 440],
        [40, 440, 280, 440],
        [280, 440, 280, 260],
        [280, 260, 80, 260],
        [80, 260, 80, 100],
        [80, 100, 280, 100],
        [280, 100, 280, 60],
        [80, 300, 80, 400],
        [80, 400, 240, 400],
        [240, 400, 240, 300],
        [240, 300, 80, 300],
        [320, 60, 560, 60],
        [560, 60, 560, 440],
        [560, 440, 520, 440],
        [520, 440, 520, 100],
        [520, 100, 320, 100],
        [320, 100, 320, 60],
      ];
      let player;
      let player2;
      let fly;
      let moves = 0;
      let canvas;
      let ctx;
      let catched = false;
      let limit;
      let globalMod = "";

      class Player {
        constructor(x, y, size, ctx, color) {
          this.x = x;
          this.y = y;
          this.size = size;
          this.ctx = ctx;
          this.color = color;
        }

        draw(ctx) {
          ctx.fillStyle = this.color;
          ctx.fillRect(
            this.x - this.size / 2,
            this.y - this.size / 2,
            this.size,
            this.size,
          );
          ctx.fillStyle = "#000000";
        }
        clear(ctx) {
          ctx.clearRect(
            this.x - this.size / 2,
            this.y - this.size / 2,
            this.size,
            this.size,
          );
        }
      }

      class Fly {
        constructor(c) {
          this.x = randRange(tiles[0]) * tilesize + 10;
          this.y = randRange(tiles[1]) * tilesize + 10;
          this.found = false;
          this.texture = new Image(10, 10);
          this.texture.src = flyt;
          this.texture.onload = () => {
            c.drawImage(this.texture, this.x - 5, this.y - 5);
          };
          console.log(`fly position: ${this.x},${this.y}`);
        }

        check(player, c) {
          if (player.x == this.x && player.y == this.y) {
            this.found = true;
            c.fillText("Fly found", 40, 80, 200);
            console.log(`Moves: ${moves}`);
          }
        }
        draw(c) {
          /* c.fillStyle = "#00ff00";
              c.fillRect(this.x - 5, this.y - 5, 10, 10);
              c.fillStyle = "#000000"; */
          c.drawImage(this.texture, this.x - 5, this.y - 5);
        }
      }

      function setResolution(canvas) {
        canvas.setAttribute("width", `${resolution[0]}`);
        canvas.setAttribute("height", `${resolution[1]}`);
      }
      function randBool() {
        if (Math.round(Math.random()) == 0) {
          return false;
        } else {
          return true;
        }
      }
      function randRange(x) {
        return Math.floor((Math.random() * 100) % x);
      }
      function gridPattern(c) {
        for (i = 1; i < tiles[1]; i++) {
          for (j = 1; j < tiles[0]; j++) {
            c.beginPath();
            c.moveTo(j * tilesize - tilesize, i * tilesize);
            c.lineTo(j * tilesize, i * tilesize);
            c.stroke();
          }
        }
        for (i = 1; i < tiles[1]; i++) {
          for (j = 0; j < tiles[0]; j++) {
            c.beginPath();
            c.moveTo(j * tilesize, i * tilesize - tilesize);
            c.lineTo(j * tilesize, i * tilesize);
            c.stroke();
          }
        }
      }
      function checkQueueEmpty() {
        if (
          queue[0] == false &&
          queue[1] == false &&
          queue[2] == false &&
          queue[3] == false
        ) {
          return true;
        } else {
          return false;
        }
      }
      function drawWalls(c) {
        for (i = 0; i < Walls.length; i++) {
          c.beginPath();
          c.moveTo(Walls[i][0], Walls[i][1]);
          c.lineTo(Walls[i][2], Walls[i][3]);
          c.stroke();
        }
      }
      function generateWalls() {
        let a;
        let d;
        let iterations = tiles[0] * tiles[1] * 0.3;
        for (i = 0; i < iterations; i++) {
          a = [randRange(tiles[0]), randRange(tiles[1]), 0, 0];
          d = randRange(3);
          switch (d) {
            case 0:
              a[2] = a[0];
              a[3] = a[1] + 1;
              break;
            case 1:
              a[2] = a[0];
              a[3] = a[1] - 1;
              break;
            case 2:
              a[3] = a[1];
              a[2] = a[0] + 1;
              break;
            case 0:
              a[3] = a[1];
              a[2] = a[0] - 1;
              break;

            default:
              break;
          }
          Walls.push(a);
        }
        for (i = 0; i < Walls.length; i++) {
          for (j = 0; j < 4; j++) {
            Walls[i][j] = Walls[i][j] * tilesize;
          }
        }
        Walls.sort();
      }
      function checkHCollision(player) {
        for (i = 0; i < Walls.length; i++) {
          /* console.log(
                `i=${i}, player = ${player.x},${player.y}, ${
                  player.y + 5 == Walls[i][1]
                } && ${Walls[i][0] <= player.x} && ${player.x <= Walls[i][2]} = ${
                  player.y + 5 == Walls[i][1] &&
                  Walls[i][0] <= player.x &&
                  player.x <= Walls[i][2]
                }`
              ); */
          if (
            player.y - 5 == Walls[i][1] &&
            Walls[i][0] <= player.x &&
            player.x <= Walls[i][2]
          ) {
            // console.log(i);
            return "north";
          } else if (
            player.y + 5 == Walls[i][1] &&
            Walls[i][0] <= player.x &&
            player.x <= Walls[i][2]
          ) {
            // console.log(i);
            return "south";
          }
          if (player.y - 5 == 0) {
            return "north";
          } else if (player.y + 5 == resolution[1]) {
            return "south";
          }
        }
      }
      function checkVCollision(player) {
        for (i = 0; i < Walls.length; i++) {
          if (
            player.x - 5 == Walls[i][0] &&
            Walls[i][3] >= player.y &&
            player.y >= Walls[i][1]
          ) {
            // console.log(i);
            return "west";
          } else if (
            player.x + 5 == Walls[i][0] &&
            Walls[i][3] >= player.y &&
            player.y >= Walls[i][1]
          ) {
            // console.log(i);
            return "east";
          }
          if (player.x - 5 == 0) {
            return "west";
          } else if (player.x + 5 == resolution[0]) {
            return "east";
          }
        }
      }
      function checkCollision(p) {
        h = checkHCollision(p);
        v = checkVCollision(p);
        r = [];
        r.push(h);
        r.push(v);
        return r;
      }

      window.onload = function () {
        addEventListener("keydown", function (e) {
          player.clear(ctx);
          player2.clear(ctx);
          if (globalMod == "speed") {
            limit = 10;
          } else {
            limit = 1;
          }

          if (globalMod == "rtp") {
            player.x = Math.round(Math.random() * 160) * 5;
            player.y = Math.round(Math.random() * 160) * 5;
            player2.x = Math.round(Math.random() * 160) * 5;
            player2.y = Math.round(Math.random() * 160) * 5;
          } else {
            for (let i = 0; i < limit; i++) {
              if (globalMod != "noclip") {
                c = checkCollision(player);
                c2 = checkCollision(player2);
              }

              switch (e.code) {
                case "ArrowLeft":
                  if (c[1] != "west") {
                    player.x -= 5;
                  }
                  break;
                case "ArrowRight":
                  if (c[1] != "east") {
                    player.x += 5;
                  }
                  break;
                case "ArrowUp":
                  if (c[0] != "north") {
                    player.y -= 5;
                  }
                  break;
                case "ArrowDown":
                  if (c[0] != "south") {
                    player.y += 5;
                  }
                  break;
                case "KeyA":
                  if (c2[1] != "west") {
                    player2.x -= 5;
                  }
                  break;
                case "KeyD":
                  if (c2[1] != "east") {
                    player2.x += 5;
                  }
                  break;
                case "KeyW":
                  if (c2[0] != "north") {
                    player2.y -= 5;
                  }
                  break;
                case "KeyS":
                  if (c2[0] != "south") {
                    player2.y += 5;
                  }
                  break;
                default:
                  break;
              }
            }
          }

          if (player.x == player2.x && player.y == player2.y) {
            catched = !catched;
            if (catched) {
              document.getElementById("catcher").innerText = "Tag: Player 2";
            } else {
              document.getElementById("catcher").innerText = "Tag: Player 1";
            }
          }
          if (globalMod != "") {
            document.getElementById("statline1").innerText = "";
            ctx.clearRect(0, 0, resolution[0], resolution[1]);
            drawWalls;
          }
          if (globalMod == "lightsoff") {
            ctx.fillRect(0, 0, resolution[0], resolution[1]);
            document.getElementById("statline1").innerText =
              '\"Who turned the lights off?\"';
          }
          if (globalMod == "invisible") {
          } else {
            player.draw(ctx);
            player2.draw(ctx);
          }

          drawWalls(ctx);
        });

        canvas = document.getElementById("display");
        setResolution(canvas);
        ctx = canvas.getContext("2d");
        ctx.strokestyle = "#000000";
        ctx.font = "50px sans";

        player = new Player(10, 10, playersize, ctx, "#ff0000");
        player2 = new Player(10, 10, playersize, ctx, "#00ff00");
        if (Math.round(Math.random() * 100) == 67) {
          Walls = Map2;
        } else {
          generateWalls();
        }

        drawWalls(ctx);
        player.draw(ctx);
        player2.draw(ctx);

        let cycles = 0;
        window.setInterval(function () {
          if (cycles != 0) {
            let choices = ["lightsoff", "invisible", "rtp", "noclip"];
            globalMod = choices[Math.round(Math.random() * 3)];
          }
          cycles++;
        }, 20000);
      };

      function reset() {
        ctx.reset();
        i = 0;
      }
    </script>
    <title>Tag (very normal)</title>
  </head>
  <body>
    <canvas id="display" style="border: 1px solid"></canvas><br />
    <span id="statline1"></span><br />
    <span id="statline2"><span id="catcher"></span></span>
  </body>
</html>
